name: Run Kaggle Notebook

on:
  repository_dispatch:
    types:
      - run-wm-pt1
      - run-wm-pt2
      - run-enhancer-pt1
      - run-enhancer-pt2
      - run-omni
      - run-render-pt1
      - run-render-pt2
      - run-merge

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle Account
        env:
          KAGGLE_USERNAME_1: ${{ secrets.KAGGLE_USERNAME_1 }}
          KAGGLE_KEY_1: ${{ secrets.KAGGLE_KEY_1 }}
          KAGGLE_USERNAME_2: ${{ secrets.KAGGLE_USERNAME_2 }}
          KAGGLE_KEY_2: ${{ secrets.KAGGLE_KEY_2 }}
          KAGGLE_USERNAME_3: ${{ secrets.KAGGLE_USERNAME_3 }}
          KAGGLE_KEY_3: ${{ secrets.KAGGLE_KEY_3 }}
          KAGGLE_USERNAME_4: ${{ secrets.KAGGLE_USERNAME_4 }}
          KAGGLE_KEY_4: ${{ secrets.KAGGLE_KEY_4 }}
          KAGGLE_USERNAME_5: ${{ secrets.KAGGLE_USERNAME_5 }}
          KAGGLE_KEY_5: ${{ secrets.KAGGLE_KEY_5 }}
          KAGGLE_USERNAME_6: ${{ secrets.KAGGLE_USERNAME_6 }}
          KAGGLE_KEY_6: ${{ secrets.KAGGLE_KEY_6 }}
        run: |
          ACCOUNT_NUM=${{ github.event.client_payload.kaggle_account }}
          echo "🔑 Usando conta Kaggle #${ACCOUNT_NUM}"

          USERNAME_VAR="KAGGLE_USERNAME_${ACCOUNT_NUM}"
          KEY_VAR="KAGGLE_KEY_${ACCOUNT_NUM}"

          mkdir -p ~/.kaggle
          echo "{\"username\":\"${!USERNAME_VAR}\",\"key\":\"${!KEY_VAR}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

          # Salvar para reutilizar no próximo step
          echo "KAGGLE_USER=${!USERNAME_VAR}" >> $GITHUB_ENV

      - name: Inject Secrets & Push Notebook
        env:
          NOTEBOOK: ${{ github.event.client_payload.notebook }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          TASK_KEY: ${{ github.event.client_payload.task }}
          ACCOUNT_NUM: ${{ github.event.client_payload.kaggle_account }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          DRIVE_CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          DRIVE_CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "📓 Notebook: ${NOTEBOOK}"
          echo "👤 Conta: ${KAGGLE_USER}"
          echo "🆔 Projeto: ${PROJECT_ID}"

          cd notebooks/

          # 💉 Injetar secrets no notebook (script Python dedicado)
          python ../inject_secrets.py

          # Criar kernel-metadata.json
          cat > kernel-metadata.json << EOF
          {
            "id": "${KAGGLE_USER}/${NOTEBOOK}-v6",
            "title": "${NOTEBOOK}-v6",
            "code_file": "${NOTEBOOK}.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": ["alessandroalvs/models"],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF

          # Push com T4 x2 forçado
          kaggle kernels push -p . --accelerator NvidiaTeslaT4

          echo "✅ Notebook enviado para execução com T4!"
          echo "⏳ Monitorando status..."

          cat > report_status.py << 'EOF'
          import os, sys, psycopg2
          task = os.environ.get("TASK_KEY")
          pid = os.environ.get("PROJECT_ID")
          status = sys.argv[1]
          db_url = os.environ.get("DATABASE_URL")

          task_map = {
              "wm-pt1": "step_watermark_pt1",
              "wm-pt2": "step_watermark_pt2",
              "enhancer-pt1": "step_enhancer_pt1",
              "enhancer-pt2": "step_enhancer_pt2",
              "omni": "step_omni",
              "render-pt1": "step_render_pt1",
              "render-pt2": "step_render_pt2",
              "merge": "step_merge"
          }
          col = task_map.get(task)
          if col and db_url and pid:
              try:
                  conn = psycopg2.connect(db_url)
                  cur = conn.cursor()
                  cur.execute(f"UPDATE pipeline_projects SET {col} = %s, current_step = %s, updated_at = NOW() WHERE id = %s::uuid", (status, col.replace("step_", ""), pid))
                  conn.commit()
                  print(f"Status macro {status} reportado para {col}")
              except Exception as e:
                  print(f"Erro DB: {e}")
          EOF
          sed -i 's/^          //' report_status.py

          pip install psycopg2-binary > /dev/null 2>&1
          
          # Monitorar execução
          for i in $(seq 1 120); do
            sleep 30
            STATUS=$(kaggle kernels status "${KAGGLE_USER}/${NOTEBOOK}-v6" 2>/dev/null | tail -1 || echo "unknown")
            echo "  [$(date +%H:%M:%S)] Status: ${STATUS}"
            
            if echo "$STATUS" | grep -qi "complete"; then
              echo "🎉 Notebook concluído com sucesso!"
              python report_status.py "done"
              exit 0
            fi
            
            if echo "$STATUS" | grep -qi "error\|cancel\|fail"; then
              echo "❌ Notebook falhou: ${STATUS}"
              python report_status.py "error"
              exit 1
            fi
          done

          echo "⏰ Timeout (60 min)"
          python report_status.py "error"
          exit 1

