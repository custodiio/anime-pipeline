name: Run Kaggle Notebook

on:
  repository_dispatch:
    types:
      - run-wm-pt1
      - run-wm-pt2
      - run-enhancer-pt1
      - run-enhancer-pt2
      - run-omni
      - run-render-pt1
      - run-render-pt2
      - run-merge

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle Account
        env:
          TASK: ${{ github.event.client_payload.task }}
          # Contas Kaggle (secrets do GitHub)
          KAGGLE_USERNAME_1: ${{ secrets.KAGGLE_USERNAME_1 }}
          KAGGLE_KEY_1: ${{ secrets.KAGGLE_KEY_1 }}
          KAGGLE_USERNAME_2: ${{ secrets.KAGGLE_USERNAME_2 }}
          KAGGLE_KEY_2: ${{ secrets.KAGGLE_KEY_2 }}
          KAGGLE_USERNAME_3: ${{ secrets.KAGGLE_USERNAME_3 }}
          KAGGLE_KEY_3: ${{ secrets.KAGGLE_KEY_3 }}
          KAGGLE_USERNAME_4: ${{ secrets.KAGGLE_USERNAME_4 }}
          KAGGLE_KEY_4: ${{ secrets.KAGGLE_KEY_4 }}
          KAGGLE_USERNAME_5: ${{ secrets.KAGGLE_USERNAME_5 }}
          KAGGLE_KEY_5: ${{ secrets.KAGGLE_KEY_5 }}
          KAGGLE_USERNAME_6: ${{ secrets.KAGGLE_USERNAME_6 }}
          KAGGLE_KEY_6: ${{ secrets.KAGGLE_KEY_6 }}
        run: |
          ACCOUNT_NUM=${{ github.event.client_payload.kaggle_account }}
          echo "🔑 Usando conta Kaggle #${ACCOUNT_NUM}"

          USERNAME_VAR="KAGGLE_USERNAME_${ACCOUNT_NUM}"
          KEY_VAR="KAGGLE_KEY_${ACCOUNT_NUM}"

          mkdir -p ~/.kaggle
          echo "{\"username\":\"${!USERNAME_VAR}\",\"key\":\"${!KEY_VAR}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Push & Run Notebook
        env:
          NOTEBOOK: ${{ github.event.client_payload.notebook }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          ACCOUNT_NUM: ${{ github.event.client_payload.kaggle_account }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          DRIVE_CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          DRIVE_CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KAGGLE_USERNAME_1: ${{ secrets.KAGGLE_USERNAME_1 }}
          KAGGLE_USERNAME_2: ${{ secrets.KAGGLE_USERNAME_2 }}
          KAGGLE_USERNAME_3: ${{ secrets.KAGGLE_USERNAME_3 }}
          KAGGLE_USERNAME_4: ${{ secrets.KAGGLE_USERNAME_4 }}
          KAGGLE_USERNAME_5: ${{ secrets.KAGGLE_USERNAME_5 }}
          KAGGLE_USERNAME_6: ${{ secrets.KAGGLE_USERNAME_6 }}
        run: |
          ACCOUNT_NUM=${{ github.event.client_payload.kaggle_account }}
          USERNAME_VAR="KAGGLE_USERNAME_${ACCOUNT_NUM}"
          KAGGLE_USER="${!USERNAME_VAR}"

          echo "📓 Notebook: ${NOTEBOOK}"
          echo "👤 Conta: ${KAGGLE_USER}"
          echo "🆔 Projeto: ${PROJECT_ID}"

          cd notebooks/

          # 💉 INJEÇÃO DIRETA DOS SECRETS E PROJECT_ID NO CÓDIGO FONTE
          python -c "
          import json, os
          file = f'{os.environ[\"NOTEBOOK\"]}.ipynb'
          with open(file, 'r', encoding='utf-8') as f: nb = json.load(f)
          
          secrets = {
              'DATABASE_URL': os.environ.get('DATABASE_URL', ''),
              'DRIVE_REFRESH_TOKEN': os.environ.get('DRIVE_REFRESH_TOKEN', ''),
              'DRIVE_CLIENT_ID': os.environ.get('DRIVE_CLIENT_ID', ''),
              'DRIVE_CLIENT_SECRET': os.environ.get('DRIVE_CLIENT_SECRET', ''),
              'HF_TOKEN': os.environ.get('HF_TOKEN', ''),
              'GEMINI_API_KEY': os.environ.get('GEMINI_API_KEY', ''),
              'OPENAI_API_KEY': os.environ.get('OPENAI_API_KEY', ''),
              'PIPELINE_PROJECT_ID': os.environ.get('PROJECT_ID', '')
          }
          
          for cell in nb['cells']:
              if cell['cell_type'] == 'code':
                  src = ''.join(cell['source'])
                  for k, v in secrets.items():
                      safe_val = json.dumps(v)
                      src = src.replace(f'_get(\"{k}\")', safe_val)
                      src = src.replace(f\"_get('{k}')\", safe_val)
                  cell['source'] = [src]
                  
          with open(file, 'w', encoding='utf-8') as f: json.dump(nb, f, ensure_ascii=False, indent=1)
          "
          echo "✅ Segredos injetados no notebook!"

          # Criar kernel-metadata.json
          cat > kernel-metadata.json << EOF
          {
            "id": "${KAGGLE_USER}/${NOTEBOOK}",
            "title": "${NOTEBOOK}",
            "code_file": "${NOTEBOOK}.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF

          # Push e executar
          kaggle kernels push -p .

          echo "✅ Notebook enviado para execução!"
          echo "⏳ Monitorando status..."

          # Monitorar execução
          for i in $(seq 1 120); do
            sleep 30
            STATUS=$(kaggle kernels status "${KAGGLE_USER}/${NOTEBOOK}" 2>/dev/null | tail -1 || echo "unknown")
            echo "  [$(date +%H:%M:%S)] Status: ${STATUS}"
            
            if echo "$STATUS" | grep -q "complete"; then
              echo "🎉 Notebook concluído com sucesso!"
              exit 0
            fi
            
            if echo "$STATUS" | grep -q "error\|cancel"; then
              echo "❌ Notebook falhou: ${STATUS}"
              exit 1
            fi
          done

          echo "⏰ Timeout (60 min)"
          exit 1
